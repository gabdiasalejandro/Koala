4244" x2="175.5766292187179" y1="31.558989156022804" y2="37.33500390624404" /><line stroke="#4E7F86" stroke-width="1.75" x1="342.73911724470565" x2="391.99423668140656" y1="254.18425196850396" y2="206.72867035597227" /><line stroke="#86B8AD" stroke-width="1.0" x1="391.99423668140656" x2="389.8936528495836" y1="206.72867035597227" y2="213.1960923744804" /><line stroke="#86B8AD" stroke-width="1.0" x1="391.99423668140656" x2="385.45314574242576" y1="206.72867035597227" y2="208.58719916338507" /><line stroke="#4E7F86" stroke-width="1.75" x1="431.3365703208135" x2="434.32502026768844" y1="133.22158374179907" y2="41.31456931033547" /><line stroke="#86B8AD" stroke-width="1.0" x1="434.32502026768844" x2="437.32833690118537" y1="41.31456931033547" y2="47.415396237806924" /><line stroke="#86B8AD" stroke-width="1.0" x1="434.32502026768844" x2="430.931717552809" y1="41.31456931033547" y2="47.2074036610696" /><line stroke="#4E7F86" stroke-width="1.75" x1="512.3462159299881" x2="558.4810506584358" y1="167.09769838938035" y2="165.48283140207712" /><line stroke="#86B8AD" stroke-width="1.0" x1="558.4810506584358" x2="552.5966646507972" y1="165.48283140207712" y2="168.8907635189342" /><line stroke="#86B8AD" stroke-width="1.0" x1="558.4810506584358" x2="552.3727812630187" y1="165.48283140207712" y2="162.49468063730444" /><rect fill="#D8F7BF" height="86.90708661417324" rx="4.0" ry="4.0" stroke="#4EA72E" stroke-width="2.6" width="189.0708661417323" x="203.10236220472444" y="254.18425196850396" /><text fill="#1F5E16" font-family="Trebuchet MS" font-size="16.8" x="210.47244094488192" y="277.2204724409449">Koala</text><text fill="#3D6D2E" font-family="Verdana" font-size="10.8" x="210.47244094488192" y="292.0551181102362">Tool that allows creating</text><text fill="#3D6D2E" font-family="Verdana" font-size="10.8" x="210.47244094488192" y="305.4551181102362">graphical organizers</text><text fill="#3D6D2E" font-family="Verdana" font-size="10.8" x="210.47244094488192" y="318.8551181102362">automatically from structured</text><text fill="#3D6D2E" font-family="Verdana" font-size="10.8" x="210.47244094488192" y="332.2551181102362">text.</text><rect fill="#E3F7E8" height="104.90708661417324" rx="4.0" ry="4.0" stroke="#5D9D5B" stroke-width="1.2" width="164.40944881889766" x="351.7630232302393" y="383.6920486902054" /><text fill="#1C5A36" font-family="Trebuchet MS" font-size="16.8" x="359.13310197039675" y="406.72826916264637">Everyday</text><text fill="#1C5A36" font-family="Trebuchet MS" font-size="16.8" x="359.13310197039675" y="424.72826916264637">problem</text><text fill="#3D6D4A" font-family="Verdana" font-size="10.8" x="359.13310197039675" y="439.5629148319377">Creating graphical</text><text fill="#3D6D4A" font-family="Verdana" font-size="10.8" x="359.13310197039675" y="452.96291483193767">organizers manually</text><text fill="#3D6D4A" font-family="Verdana" font-size="10.8" x="359.13310197039675" y="466.3629148319377">requires a lot of time and</text><text fill="#3D6D4A" font-family="Verdana" font-size="10.8" x="359.13310197039675" y="479.7629148319377">effort.</text><rect fill="#DDF6F0" height="86.90708661417324" rx="4.0" ry="4.0" stroke="#2F9B8F" stroke-width="1.2" width="164.40944881889766" x="574.2992034146464" y="400.5356339351448" /><text fill="#0F5A63" font-family="Trebuchet MS" font-size="16.8" x="581.6692821548039" y="423.57185440758576">Manual diagrams</text><text fill="#2C6670" font-family="Verdana" font-size="10.8" x="581.6692821548039" y="438.4065000768771">Students must arrange</text><text fill="#2C6670" font-family="Verdana" font-size="10.8" x="581.6692821548039" y="451.80650007687706">boxes, arrows, and text in</text><text fill="#2C6670" font-family="Verdana" font-size="10.8" x="581.6692821548039" y="465.2065000768771">programs like Word or</text><text fill="#2C6670" font-family="Verdana" font-size="10.8" x="581.6692821548039" y="478.60650007687707">PowerPoint.</text><rect fill="#F3F5F7" height="104.90708661417324" rx="4.0" ry="4.0" stroke="#9AA8B5" stroke-width="1.2" width="164.40944881889766" x="351.87828830389896" y="576.8893866039778" /><text fill="#4A5562" font-family="Trebuchet MS" font-size="16.8" x="359.2483670440564" y="599.9256070764186">Time spent on</text><text fill="#4A5562" font-family="Trebuchet MS" font-size="16.8" x="359.2483670440564" y="617.9256070764186">formatting</text><text fill="#6A7480" font-family="Verdana" font-size="10.8" x="359.2483670440564" y="632.76025274571">A large portion of the</text><text fill="#6A7480" font-family="Verdana" font-size="10.8" x="359.2483670440564" y="646.16025274571">work is dedicated to</text><text fill="#6A7480" font-family="Verdana" font-size="10.8" x="359.2483670440564" y="659.5602527457099">adjusting the layout instead</text><text fill="#6A7480" font-family="Verdana" font-size="10.8" x="359.2483670440564" y="672.96025274571">of organizing ideas.</text><rect fill="#E3F7E8" height="73.50708661417323" rx="4.0" ry="4.0" stroke="#5D9D5B" stroke-width="1.2" width="164.40944881889766" x="81.47960310461451" y="387.4526643837715" /><text fill="#1C5A36" font-family="Trebuchet MS" font-size="16.8" x="88.849681844772" y="410.48888485621245">Solution idea</text><text fill="#3D6D4A" font-family="Verdana" font-size="10.8" x="88.849681844772" y="425.32353052550377">Describe diagrams using</text><text fill="#3D6D4A" font-family="Verdana" font-size="10.8" x="88.849681844772" y="438.72353052550375">structured text that the</text><text fill="#3D6D4A" font-family="Verdana" font-size="10.8" x="88.849681844772" y="452.1235305255038">system can interpret.</text><rect fill="#DDF6F0" height="91.50708661417323" rx="4.0" ry="4.0" stroke="#2F9B8F" stroke-width="1.2" width="164.40944881889766" x="84.61441793339108" y="554.8241445425626" /><text fill="#0F5A63" font-family="Trebuchet MS" font-size="16.8" x="91.98449667354856" y="577.8603650150035">Writing the</text><text fill="#0F5A63" font-family="Trebuchet MS" font-size="16.8" x="91.98449667354856" y="595.8603650150035">structure</text><text fill="#2C6670" font-family="Verdana" font-size="10.8" x="91.98449667354856" y="610.6950106842949">The user writes concepts</text><text fill="#2C6670" font-family="Verdana" font-size="10.8" x="91.98449667354856" y="624.0950106842948">and relationships in a</text><text fill="#2C6670" font-family="Verdana" font-size="10.8" x="91.98449667354856" y="637.4950106842948">simple textual format.</text><rect fill="#F3F5F7" height="104.90708661417324" rx="4.0" ry="4.0" stroke="#9AA8B5" stroke-width="1.2" width="164.40944881889766" x="-134.34292068135966" y="378.9474822462637" /><text fill="#4A5562" font-family="Trebuchet MS" font-size="16.8" x="-126.97284194120218" y="401.98370271870465">Single source of</text><text fill="#4A5562" font-family="Trebuchet MS" font-size="16.8" x="-126.97284194120218" y="419.98370271870465">content</text><text fill="#6A7480" font-family="Verdana" font-size="10.8" x="-126.97284194120218" y="434.81834838799597">The same information can</text><text fill="#6A7480" font-family="Verdana" font-size="10.8" x="-126.97284194120218" y="448.21834838799595">be reused to generate</text><text fill="#6A7480" font-family="Verdana" font-size="10.8" x="-126.97284194120218" y="461.618348387996">different types of</text><text fill="#6A7480" font-family="Verdana" font-size="10.8" x="-126.97284194120218" y="475.01834838799596">diagrams.</text><rect fill="#E3F7E8" height="86.90708661417324" rx="4.0" ry="4.0" stroke="#5D9D5B" stroke-width="1.2" width="164.40944881889766" x="88.45302454556281" y="116.88661207151247" /><text fill="#1C5A36" font-family="Trebuchet MS" font-size="16.8" x="95.8231032857203" y="139.92283254395343">System process</text><text fill="#3D6D4A" font-family="Verdana" font-size="10.8" x="95.8231032857203" y="154.75747821324478">Koala interprets the</text><text fill="#3D6D4A" font-family="Verdana" font-size="10.8" x="95.8231032857203" y="168.1574782132448">written structure and</text><text fill="#3D6D4A" font-family="Verdana" font-size="10.8" x="95.8231032857203" y="181.5574782132448">automatically generates the</text><text fill="#3D6D4A" font-family="Verdana" font-size="10.8" x="95.8231032857203" y="194.95747821324477">diagram.</text><rect fill="#DDF6F0" height="91.50708661417323" rx="4.0" ry="4.0" stroke="#2F9B8F" stroke-width="1.2" width="164.40944881889766" x="-128.14046791773717" y="93.22124101309977" /><text fill="#0F5A63" font-family="Trebuchet MS" font-size="16.8" x="-120.77038917757969" y="116.25746148554072">Interpreting</text><text fill="#0F5A63" font-family="Trebuchet MS" font-size="16.8" x="-120.77038917757969" y="134.25746148554072">information</text><text fill="#2C6670" font-family="Verdana" font-size="10.8" x="-120.77038917757969" y="149.09210715483206">The system identifies the</text><text fill="#2C6670" font-family="Verdana" font-size="10.8" x="-120.77038917757969" y="162.49210715483207">hierarchy between</text><text fill="#2C6670" font-family="Verdana" font-size="10.8" x="-120.77038917757969" y="175.89210715483208">concepts.</text><rect fill="#DDF6F0" height="91.50708661417323" rx="4.0" ry="4.0" stroke="#2F9B8F" stroke-width="1.2" width="164.40944881889766" x="99.98297882073825" y="-59.94809745815043" /><text fill="#0F5A63" font-family="Trebuchet MS" font-size="16.8" x="107.35305756089573" y="-36.91187698570948">Generating the</text><text fill="#0F5A63" font-family="Trebuchet MS" font-size="16.8" x="107.35305756089573" y="-18.911876985709483">diagram</text><text fill="#2C6670" font-family="Verdana" font-size="10.8" x="107.35305756089573" y="-4.077231316418141">The program arranges</text><text fill="#2C6670" font-family="Verdana" font-size="10.8" x="107.35305756089573" y="9.32276868358186">nodes and produces the</text><text fill="#2C6670" font-family="Verdana" font-size="10.8" x="107.35305756089573" y="22.72276868358186">graphical organizer.</text><rect fill="#E3F7E8" height="73.50708661417323" rx="4.0" ry="4.0" stroke="#5D9D5B" stroke-width="1.2" width="164.40944881889766" x="347.93676711109055" y="133.22158374179907" /><text fill="#1C5A36" font-family="Trebuchet MS" font-size="16.8" x="355.306845851248" y="156.25780421424002">User outcome</text><text fill="#3D6D4A" font-family="Verdana" font-size="10.8" x="355.306845851248" y="171.09244988353137">The user obtains clear</text><text fill="#3D6D4A" font-family="Verdana" font-size="10.8" x="355.306845851248" y="184.49244988353138">diagrams without having to</text><text fill="#3D6D4A" font-family="Verdana" font-size="10.8" x="355.306845851248" y="197.89244988353138">design them manually.</text><rect fill="#DDF6F0" height="91.50708661417323" rx="4.0" ry="4.0" stroke="#2F9B8F" stroke-width="1.2" width="164.40944881889766" x="353.6080188020348" y="-50.19251730383776" /><text fill="#0F5A63" font-family="Trebuchet MS" font-size="16.8" x="360.97809754219224" y="-27.156296831396812">Different types</text><text fill="#0F5A63" font-family="Trebuchet MS" font-size="16.8" x="360.97809754219224" y="-9.156296831396812">of organizers</text><text fill="#2C6670" font-family="Verdana" font-size="10.8" x="360.97809754219224" y="5.678348837894527">It can generate mind maps,</text><text fill="#2C6670" font-family="Verdana" font-size="10.8" x="360.97809754219224" y="19.078348837894527">synoptic charts, or</text><text fill="#2C6670" font-family="Verdana" font-size="10.8" x="360.97809754219224" y="32.47834883789453">organizational diagrams.</text><rect fill="#F3F5F7" height="73.50708661417323" rx="4.0" ry="4.0" stroke="#9AA8B5" stroke-width="1.2" width="164.40944881889766" x="558.4810506584358" y="125.8518594354852" /><text fill="#4A5562" font-family="Trebuchet MS" font-size="16.8" x="565.8511293985933" y="148.88807990792614">Time savings</text><text fill="#6A7480" font-family="Verdana" font-size="10.8" x="565.8511293985933" y="163.7227255772175">The student can focus on</text><text fill="#6A7480" font-family="Verdana" font-size="10.8" x="565.8511293985933" y="177.1227255772175">understanding and</text><text fill="#6A7480" font-family="Verdana" font-size="10.8" x="565.8511293985933" y="190.5227255772175">organizing ideas.</text></g></svg>